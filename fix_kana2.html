<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カナ文字修正ツール v2</title>
<style>
body{font-family:sans-serif;background:#0F1117;color:#E8EAF0;padding:20px;max-width:640px;margin:0 auto}
h2{color:#00E676}
.btn{padding:10px 20px;border-radius:8px;border:2px solid;cursor:pointer;font-size:14px;font-weight:700;background:#080808;margin-right:8px}
.btn-green{border-color:#00E676;color:#00E676}
.btn:disabled{opacity:0.4;cursor:not-allowed}
#log{background:#1C1F2A;border-radius:8px;padding:12px;margin-top:16px;font-size:12px;line-height:1.9;max-height:600px;overflow-y:auto;border:1px solid #383C4E}
.ok{color:#00E676}.err{color:#FF1744}.info{color:#00ADEF}.warn{color:#FFB300}
</style>
</head>
<body>
<h2>🔧 カナ文字修正ツール v2</h2>
<p style="font-size:13px;color:#A0A8C0">U+FF9E(ﾞ)・U+FF9F(ﾟ)を前のカタカナと合成して正しい文字に修正します。</p>
<div style="margin-top:16px">
  <button class="btn btn-green" id="btn-dry" onclick="run(true)">🔍 ドライラン</button>
  <button class="btn btn-green" id="btn-run" onclick="run(false)">▶ 修正実行</button>
</div>
<div id="log"><span class="info">準備完了。まずドライランで確認してください。</span></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFJKdWkTa9WvX9W3ZA95P0BoDDugQUkuM",
  authDomain: "ciel-autoworks.firebaseapp.com",
  databaseURL: "https://ciel-autoworks-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ciel-autoworks",
  storageBucket: "ciel-autoworks.firebasestorage.app",
  messagingSenderId: "266528519369",
  appId: "1:266528519369:web:d32686387aa9b0362cc918"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// U+FF9E(ﾞ)・U+FF9F(ﾟ)を前のカタカナと合成
function fixKana(s){
  if(!s)return s;
  const dk={
    'カ':'ガ','キ':'ギ','ク':'グ','ケ':'ゲ','コ':'ゴ',
    'サ':'ザ','シ':'ジ','ス':'ズ','セ':'ゼ','ソ':'ゾ',
    'タ':'ダ','チ':'ヂ','ツ':'ヅ','テ':'デ','ト':'ド',
    'ハ':'バ','ヒ':'ビ','フ':'ブ','ヘ':'ベ','ホ':'ボ','ウ':'ヴ'
  };
  const hdk={'ハ':'パ','ヒ':'ピ','フ':'プ','ヘ':'ペ','ホ':'ポ'};
  const chars=[...s];
  let result='';
  for(let i=0;i<chars.length;i++){
    const c=chars[i];
    if(c==='\uFF9E'&&result.length>0){  // U+FF9E ﾞ
      const prev=result[result.length-1];
      if(dk[prev]){result=result.slice(0,-1)+dk[prev];continue;}
    }
    if(c==='\uFF9F'&&result.length>0){  // U+FF9F ﾟ
      const prev=result[result.length-1];
      if(hdk[prev]){result=result.slice(0,-1)+hdk[prev];continue;}
    }
    result+=c;
  }
  return result;
}

function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${cls}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

window.run=async function(dryRun){
  document.getElementById('btn-dry').disabled=true;
  document.getElementById('btn-run').disabled=true;
  document.getElementById('log').innerHTML='';
  log(dryRun?'=== ドライラン開始 ===':'=== 修正実行開始 ===','info');

  let fixCount=0,skipCount=0;
  try{
    const snap=await get(ref(db,'stock'));
    const data=snap.val()||{};
    for(const [id,v] of Object.entries(data)){
      const fields=['name','color','sup','displayNote'];
      const upd={};
      let changed=false;
      for(const f of fields){
        if(!v[f])continue;
        const fixed=fixKana(v[f]);
        if(fixed!==v[f]){
          log(`[修正] ${f}: 「${v[f]}」→「${fixed}」`,'warn');
          upd[f]=fixed;
          changed=true;
        }
      }
      if(changed){
        if(!dryRun){
          await update(ref(db,`stock/${id}`),upd);
          log(`  → 保存完了`,'ok');
        }
        fixCount++;
      }else{
        skipCount++;
      }
    }
    log('','');
    log(`=== 完了 === 修正${fixCount}件 / 変更なし${skipCount}件`,'ok');
    if(dryRun)log('※ドライランのため変更はありません。「修正実行」で本番修正できます。','info');
    else log('修正完了！アプリを再読み込みしてご確認ください。','ok');
  }catch(err){
    log('エラー: '+err.message,'err');
  }
  document.getElementById('btn-dry').disabled=false;
  document.getElementById('btn-run').disabled=false;
};
</script>
</body>
</html>
