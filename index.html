<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>中古車管理 | ciel autoworks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#F4F4F2;--surface:#FFF;--surface2:#F0EFF0;
    --border:#E2E1DF;--border2:#D0CFC9;
    --text:#1A1A1A;--text2:#6B6B6B;--text3:#9B9B9B;
    --green:#1A6B45;--green-bg:#E6F4EC;
    --amber:#7C4A00;--amber-bg:#FEF3DC;
    --red:#9B1C1C;--red-bg:#FEE9E9;
    --blue:#0C3D8A;--blue-bg:#E8F0FB;
    --purple:#3D2E8A;--purple-bg:#EEECFB;
    --orange:#8A3D0C;--orange-bg:#FBF0E8;
    --gray:#4B4B4B;--gray-bg:#EFEFEF;
    --accent:#1A6B45;
    --radius:10px;--radius-sm:7px;
    --shadow:0 1px 4px rgba(0,0,0,0.08);
  }
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .header-title{font-size:15px;font-weight:700}
  .header-sub{font-size:10px;color:var(--text3);margin-top:1px}
  .sync-badge{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:500}
  .sync-badge.error{background:var(--red-bg);color:var(--red)}
  .sync-badge.saving{background:var(--amber-bg);color:var(--amber)}
  .sync-badge.connecting{background:var(--blue-bg);color:var(--blue)}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:49}
  .tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;font-weight:500;transition:all .15s}
  .tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .content{padding:12px;flex:1}
  .hidden{display:none!important}
  .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
  .item-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
  .item-row:last-child{border-bottom:none}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:12px;font-family:inherit;color:var(--text);gap:4px;white-space:nowrap;font-weight:500;transition:opacity .1s}
  .btn:active{opacity:.7}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-sm{padding:4px 9px;font-size:11px}
  .btn-xs{padding:3px 7px;font-size:10px}
  .btn-danger{background:var(--red-bg);border-color:#fca5a5;color:var(--red)}
  .btn-success{background:var(--green);border-color:var(--green);color:#fff}
  .btn-amber{background:var(--amber);border-color:var(--amber);color:#fff}
  .btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn-orange{background:var(--orange-bg);border-color:#d97706;color:var(--orange)}
  .btn-gray{background:var(--gray-bg);border-color:var(--border2);color:var(--gray)}
  .badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
  /* 代車バッジ */
  .b-av{background:var(--green-bg);color:var(--green)}
  .b-rv{background:var(--amber-bg);color:var(--amber)}
  .b-out{background:var(--red-bg);color:var(--red)}
  /* ステータス①バッジ */
  .b-undelivered{background:#F3F0FF;color:#4C1D95}
  .b-floor{background:var(--green-bg);color:var(--green)}
  .b-loaner{background:var(--amber-bg);color:var(--amber)}
  .b-listing{background:var(--blue-bg);color:var(--blue)}
  .b-sold-ng{background:var(--red-bg);color:var(--red)}
  .b-sold-ok{background:var(--blue-bg);color:var(--blue)}
  .b-delivered{background:var(--gray-bg);color:var(--gray)}
  /* ステータス②バッジ */
  .b-insp-none{background:var(--red-bg);color:var(--red)}
  .b-insp-ng{background:var(--orange-bg);color:var(--orange)}
  .b-insp-ok{background:var(--blue-bg);color:var(--blue)}
  .b-insp-skip{background:var(--gray-bg);color:var(--gray)}
  /* その他 */
  .b-loan-tag{background:#FFF0E0;color:#7C3A00;border:1px solid #F5C58A}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .stat{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:10px;text-align:center;box-shadow:var(--shadow)}
  .stat-n{font-size:24px;font-weight:700}
  .stat-l{font-size:10px;color:var(--text3);margin-top:2px}
  .loaner-avail{background:var(--green-bg);border-radius:var(--radius);padding:14px;text-align:center;margin-bottom:12px;box-shadow:var(--shadow)}
  .loaner-avail-n{font-size:48px;font-weight:700;color:var(--green);line-height:1}
  .loaner-avail-l{font-size:12px;color:var(--green);margin-top:4px;font-weight:500}
  .loaner-sub-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  input[type=text],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .lbl{font-size:11px;color:var(--text2);margin-bottom:4px;margin-top:10px;font-weight:700}
  .lbl:first-child{margin-top:0}
  .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end}
  .modal-wrap.open{display:flex}
  .modal-box{background:var(--surface);border-radius:18px 18px 0 0;padding:16px;width:100%;max-height:92vh;overflow-y:auto}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:12px}
  .modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
  .full-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;padding:16px}
  .full-wrap.open{display:flex}
  .full-wrap img{max-width:100%;max-height:68vh;border-radius:10px;object-fit:contain}
  .close-x{position:absolute;top:16px;right:16px;color:#fff;font-size:16px;cursor:pointer;background:rgba(255,255,255,0.15);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .photo-card{background:var(--surface2);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;border:1px solid var(--border)}
  .photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
  .photo-info{padding:5px 7px}
  .search-row{display:flex;gap:6px;margin-bottom:8px}
  .search-row input{flex:1}
  .search-row select{width:auto;min-width:80px}
  .dtable{width:100%;font-size:12px;border-collapse:collapse;margin-bottom:10px}
  .dtable td{padding:5px 0;vertical-align:top;border-bottom:1px solid var(--border)}
  .dtable td:first-child{color:var(--text2);width:90px;padding-right:8px}
  .dtable tr:last-child td{border-bottom:none}
  .bulk-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;box-shadow:var(--shadow)}
  .bulk-bar select{width:auto;flex:1;min-width:100px}
  input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
  .stock-item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:10px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;gap:8px;align-items:flex-start}
  .stock-item.checked{border-color:var(--accent);background:#f0faf4}
  .stock-item-body{flex:1;min-width:0}
  .action-btns{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .individual-select{font-size:11px;padding:3px 6px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer;max-width:110px}
  .spinner-wrap{position:fixed;inset:0;background:rgba(255,255,255,0.88);z-index:400;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .days-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;background:#FFF0E0;color:#7C3A00;margin-left:4px}
  .check-row{display:flex;align-items:center;gap:8px;padding:6px 0}
  .check-row input[type=checkbox]{width:16px;height:16px}
  .check-row label{font-size:13px;cursor:pointer}
</style>
</head>
<body>

<div class="spinner-wrap" id="loading">
  <div class="spinner"></div>
  <p style="font-size:13px;color:var(--text2)" id="loading-msg">Firebaseに接続中...</p>
</div>

<div class="app">
  <div class="header">
    <div>
      <div class="header-title">🚗 中古車管理</div>
      <div class="header-sub">ciel autoworks</div>
    </div>
    <span class="sync-badge connecting" id="sync-st">● 接続中</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('loaner')">代車</div>
    <div class="tab" onclick="switchTab('stock')">販売車</div>
    <div class="tab" onclick="switchTab('inspection')">点検シート</div>
  </div>

  <!-- 代車タブ -->
  <div id="tab-loaner" class="content">
    <div class="loaner-avail">
      <div class="loaner-avail-n" id="loaner-avail-n">0</div>
      <div class="loaner-avail-l">台 空き</div>
    </div>
    <div class="loaner-sub-stats" id="loaner-sub-stats"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:13px;font-weight:700">代車一覧</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-gray" onclick="openAddFromStock()">販売車から追加</button>
        <button class="btn btn-sm" onclick="openModal('modal-add-car')">＋ 新規追加</button>
      </div>
    </div>
    <div class="card" id="loaner-list"></div>
  </div>

  <!-- 販売車タブ -->
  <div id="tab-stock" class="content hidden">
    <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-sm btn-primary" onclick="document.getElementById('csv-input').click()">📂 CSV読込</button>
      <input type="file" id="csv-input" accept=".csv,.CSV" style="display:none" onchange="importCSV(event)">
      <span style="font-size:11px;color:var(--text3)" id="csv-count"></span>
    </div>
    <div class="stats" id="stock-stats"></div>
    <!-- 一括操作バー -->
    <div class="bulk-bar">
      <input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)" title="全選択">
      <span style="font-size:11px;color:var(--text2)" id="chk-count">0件選択</span>
      <select id="bulk-action" style="font-size:11px">
        <option value="">一括操作...</option>
        <optgroup label="▼ステータス①">
          <option value="s1_undelivered">店頭未着</option>
          <option value="s1_floor">店頭在庫</option>
          <option value="s1_loaner">代車/レンタカー</option>
          <option value="s1_listing">出品</option>
          <option value="s1_sold_ng">販売済(要仕上)</option>
          <option value="s1_sold_ok">販売済(仕上完了)</option>
          <option value="s1_delivered">納車完了</option>
        </optgroup>
        <optgroup label="▼ステータス②">
          <option value="s2_none">未点検</option>
          <option value="s2_ng">点検済(要整備)</option>
          <option value="s2_ok">点検済(異常なし)</option>
          <option value="s2_skip">点検不要</option>
        </optgroup>
        <optgroup label="▼その他">
          <option value="delete">削除</option>
        </optgroup>
      </select>
      <button class="btn btn-sm btn-primary" onclick="applyBulk()">実行</button>
    </div>
    <div class="search-row">
      <input type="text" id="stock-search" placeholder="車名・車台番号で検索..." oninput="renderStock()">
      <select id="stock-filter" onchange="renderStock()" style="font-size:11px">
        <option value="">すべて</option>
        <optgroup label="ステータス①">
          <option value="s1_undelivered">未着</option>
          <option value="s1_floor">店頭在庫</option>
          <option value="s1_loaner">代車中</option>
          <option value="s1_listing">出品</option>
          <option value="s1_sold_ng">販売済(要仕上)</option>
          <option value="s1_sold_ok">販売済(完了)</option>
          <option value="s1_delivered">納車完了</option>
        </optgroup>
        <optgroup label="ステータス②">
          <option value="s2_none">未点検</option>
          <option value="s2_ng">要整備</option>
          <option value="s2_ok">点検済</option>
          <option value="s2_skip">点検不要</option>
        </optgroup>
      </select>
    </div>
    <div id="stock-list"></div>
  </div>

  <!-- 点検シートタブ -->
  <div id="tab-inspection" class="content hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;font-weight:700">点検シート</span>
      <button class="btn btn-sm btn-primary" onclick="openUpload()">＋ アップロード</button>
    </div>
    <div id="photo-grid" class="photo-grid"></div>
    <p id="no-photos" style="text-align:center;color:var(--text3);font-size:13px;padding:30px 0">点検シートがありません</p>
  </div>
</div>

<!-- モーダル群 -->
<div class="modal-wrap" id="modal-action"><div class="modal-box"><div class="modal-handle"></div><p class="modal-title" id="ma-title"></p><div id="ma-body"></div></div></div>

<div class="modal-wrap" id="modal-add-car">
  <div class="modal-box"><div class="modal-handle"></div>
    <p class="modal-title">代車を新規追加</p>
    <p class="lbl">車種名</p><input type="text" id="nc-name" placeholder="例：ホンダ フィット">
    <p class="lbl">ナンバープレート</p><input type="text" id="nc-plate" placeholder="例：新潟 300 あ 1234">
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-add-car')">キャンセル</button>
      <button class="btn btn-primary" style="flex:1" onclick="addCar()">追加</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="modal-add-from-stock">
  <div class="modal-box"><div class="modal-handle"></div>
    <p class="modal-title">販売車から代車に追加</p>
    <div id="stock-for-loaner-list"></div>
    <button class="btn" style="width:100%;margin-top:12px" onclick="closeModal('modal-add-from-stock')">閉じる</button>
  </div>
</div>

<div class="modal-wrap" id="modal-upload">
  <div class="modal-box"><div class="modal-handle"></div>
    <p class="modal-title">点検シートアップロード</p>
    <p class="lbl">車両を選択（任意）</p><select id="up-vehicle"></select>
    <p class="lbl">または車種名を直接入力</p><input type="text" id="up-name" placeholder="例：トヨタ プリウス">
    <p class="lbl">メモ（任意）</p><input type="text" id="up-memo" placeholder="例：オイル漏れあり">
    <div class="check-row" style="margin-top:10px">
      <input type="checkbox" id="up-repair" style="width:18px;height:18px">
      <label for="up-repair" style="font-size:13px;font-weight:700;color:var(--red)">⚠️ 要整備あり</label>
    </div>
    <p class="lbl">写真</p>
    <div style="border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;color:var(--text3)" onclick="document.getElementById('file-input').click()">
      <div id="up-preview"><div style="font-size:24px">📷</div><p style="font-size:13px">タップして写真を選択</p></div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="previewPhoto(event)">
    <div id="up-progress" style="display:none;margin-top:8px;font-size:12px;color:var(--green);font-weight:700;text-align:center"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-upload')">キャンセル</button>
      <button class="btn btn-primary" style="flex:1" id="btn-save-insp" onclick="saveInsp()">保存</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="modal-stock-detail"><div class="modal-box"><div class="modal-handle"></div><p class="modal-title" id="sd-title"></p><div id="sd-body"></div></div></div>

<div class="full-wrap" id="full-img">
  <div class="close-x" onclick="closeFullImg()">✕</div>
  <img id="full-img-el" src="">
  <div style="color:#fff;margin-top:12px;text-align:center">
    <p id="full-img-name" style="font-size:14px;font-weight:700"></p>
    <p id="full-img-meta" style="font-size:11px;opacity:0.65;margin-top:3px"></p>
  </div>
</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, remove, onValue }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFJKdWkTa9WvX9W3ZA95P0BoDDugQUkuM",
  authDomain: "ciel-autoworks.firebaseapp.com",
  databaseURL: "https://ciel-autoworks-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ciel-autoworks",
  storageBucket: "ciel-autoworks.firebasestorage.app",
  messagingSenderId: "266528519369",
  appId: "1:266528519369:web:d32686387aa9b0362cc918"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);

// ===== 定数 =====
// ステータス①
const S1 = {
  undelivered: {label:'店頭未着',  cls:'b-undelivered'},
  floor:       {label:'店頭在庫',  cls:'b-floor'},
  loaner:      {label:'代車/レンタカー', cls:'b-loaner'},
  listing:     {label:'出品中',    cls:'b-listing'},
  sold_ng:     {label:'販売済(要仕上)', cls:'b-sold-ng'},
  sold_ok:     {label:'販売済(仕上完了)', cls:'b-sold-ok'},
  delivered:   {label:'納車完了',  cls:'b-delivered'},
};
// ステータス②
const S2 = {
  none: {label:'未点検',      cls:'b-insp-none'},
  ng:   {label:'点検済(要整備)', cls:'b-insp-ng'},
  ok:   {label:'点検済(異常なし)', cls:'b-insp-ok'},
  skip: {label:'点検不要',    cls:'b-insp-skip'},
};

// ===== 状態 =====
let cars={}, stock={}, inspections={};
let uploadDataUrl=null, selectedCarId=null;
let checkedIds=new Set();
let ready=false;

function today(){ return new Date().toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}); }
function nowTs(){ return Date.now(); }
function fmt(n){ return n?Number(n).toLocaleString():'0'; }
function uid(){ return 'i'+nowTs()+Math.random().toString(36).slice(2,6); }
function daysSince(ts){ if(!ts)return null; return Math.floor((Date.now()-ts)/(1000*60*60*24)); }

function setSyncSt(t,s='ok'){
  const el=document.getElementById('sync-st');
  el.textContent=t;
  el.className='sync-badge'+(s==='error'?' error':s==='saving'?' saving':s==='connecting'?' connecting':'');
}
function showLoading(msg){ document.getElementById('loading-msg').textContent=msg||'処理中...'; document.getElementById('loading').style.display='flex'; }
function hideLoading(){ document.getElementById('loading').style.display='none'; }

// ===== Firebase =====
function startListeners(){
  onValue(ref(db,'.info/connected'), snap=>{
    if(snap.val()){ setSyncSt('● 同期中','ok'); if(!ready){ready=true;hideLoading();} }
    else{ setSyncSt('● 再接続中...','connecting'); }
  });
  onValue(ref(db,'cars'),   snap=>{ cars=snap.val()||{};   renderLoaner(); });
  onValue(ref(db,'stock'),  snap=>{ stock=snap.val()||{};  renderStockStats(); renderStock(); updateCsvCount(); });
  onValue(ref(db,'inspections'), snap=>{ inspections=snap.val()||{}; renderInspections(); });
}

window.doAction=async function(action){
  const car={...cars[selectedCarId]};

  if(action==='out'){car.status='out';car.borrower=(b?.value||'').trim()||'不明';car.since=today();car.outTs=nowTs();}

};

// ===== CSV読込 =====
window.importCSV=function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{parseCSV(ev.target.result);e.target.value='';};
  reader.readAsText(file,'Shift-JIS');
};
function parseCSV(text){
  text=text.replace(/^\uFEFF/,'');
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  let hi=8;
  for(let i=0;i<Math.min(15,lines.length);i++){
    if(lines[i].includes('車名')&&lines[i].includes('車台番号')){hi=i;break;}
  }
  const hdrs=parseLine(lines[hi]).map(h=>h.replace(/"/g,'').trim());
  const fi=(...c)=>{for(const x of c){const i=hdrs.indexOf(x);if(i>=0)return i;}return -1;};
  const idx={
    date:fi('仕入日'),cdate:fi('契約日'),ddate:fi('納車日'),sdate:fi('売上日'),
    num:fi('車両仕入番号'),seiri:fi('車両整理番号'),seiri2:fi('整理番号'),
    staff:fi('仕入担当名'),name:fi('車名'),sup:fi('仕入先名'),
    color:fi('色'),vin:fi('車台番号'),type:fi('型式類別'),
    year:fi('年式'),shaken:fi('車検期限'),equip:fi('装備品'),
    price:fi('仕入金額'),total:fi('合計'),
  };
  const g=(row,i)=>i>=0&&i<row.length?row[i].replace(/^"|"$/g,'').trim():'';
  const existVins=new Set(Object.values(stock).map(v=>v.vin).filter(Boolean));
  const batch={};let added=0,skipped=0;
  for(let i=hi+1;i<lines.length;i++){
    const row=parseLine(lines[i]);
    if(!row||row.length<5)continue;
    const first=g(row,0);
    if(!first||!/^(平成|令和|昭和|\d{4})/.test(first))continue;
    const vin=g(row,idx.vin);
    if(vin&&existVins.has(vin)){skipped++;continue;}
    const id=uid();
    const v={
      id,date:fmtDate(g(row,idx.date)),cdate:fmtDate(g(row,idx.cdate)),
      ddate:fmtDate(g(row,idx.ddate)),sdate:fmtDate(g(row,idx.sdate)),
      num:g(row,idx.num),seiri:g(row,idx.seiri)||g(row,idx.seiri2),
      staff:g(row,idx.staff),name:kana2full(g(row,idx.name)),sup:g(row,idx.sup),
      color:g(row,idx.color),vin,type:g(row,idx.type),
      year:fmtDate(g(row,idx.year)),shaken:fmtDate(g(row,idx.shaken)),
      equip:g(row,idx.equip),price:g(row,idx.price),total:g(row,idx.total),
      regNo:'',loc:'本社',
      status1:'undelivered', status2:'none',  // 初期値
      cleaned:false, photographed:false, maintained:false,
      memo:'',isLoaner:false,addedAt:nowTs()
    };
    if(v.name||v.vin){batch[id]=v;if(vin)existVins.add(vin);added++;}
  }
  if(!added){alert(`追加: 0台 / スキップ(重複): ${skipped}台`);return;}
  update(ref(db,'stock'),batch).then(()=>alert(`読み込み完了 ✅\n追加: ${added}台 / スキップ(重複): ${skipped}台`))
    .catch(err=>alert('保存エラー: '+err.message));
}
function parseLine(line){
  const res=[];let cur='';let inQ=false;
  for(const c of line){
    if(c==='"'){inQ=!inQ;}
    else if((c===','||c==='\t')&&!inQ){res.push(cur);cur='';}
    else{cur+=c;}
  }
  res.push(cur);return res;
}
function kana2full(s){
  if(!s)return s;
  const m={'ｦ':'ヲ','ｧ':'ァ','ｨ':'ィ','ｩ':'ゥ','ｪ':'ェ','ｫ':'ォ','ｬ':'ャ','ｭ':'ュ','ｮ':'ョ','ｯ':'ッ','ｰ':'ー','ｱ':'ア','ｲ':'イ','ｳ':'ウ','ｴ':'エ','ｵ':'オ','ｶ':'カ','ｷ':'キ','ｸ':'ク','ｹ':'ケ','ｺ':'コ','ｻ':'サ','ｼ':'シ','ｽ':'ス','ｾ':'セ','ｿ':'ソ','ﾀ':'タ','ﾁ':'チ','ﾂ':'ツ','ﾃ':'テ','ﾄ':'ト','ﾅ':'ナ','ﾆ':'ニ','ﾇ':'ヌ','ﾈ':'ネ','ﾉ':'ノ','ﾊ':'ハ','ﾋ':'ヒ','ﾌ':'フ','ﾍ':'ヘ','ﾎ':'ホ','ﾏ':'マ','ﾐ':'ミ','ﾑ':'ム','ﾒ':'メ','ﾓ':'モ','ﾔ':'ヤ','ﾕ':'ユ','ﾖ':'ヨ','ﾗ':'ラ','ﾘ':'リ','ﾙ':'ル','ﾚ':'レ','ﾛ':'ロ','ﾜ':'ワ','ﾝ':'ン'};
  const dk={'カ':'ガ','キ':'ギ','ク':'グ','ケ':'ゲ','コ':'ゴ','サ':'ザ','シ':'ジ','ス':'ズ','セ':'ゼ','ソ':'ゾ','タ':'ダ','チ':'ヂ','ツ':'ヅ','テ':'デ','ト':'ド','ハ':'バ','ヒ':'ビ','フ':'ブ','ヘ':'ベ','ホ':'ボ','ウ':'ヴ'};
  const hdk={'ハ':'パ','ヒ':'ピ','フ':'プ','ヘ':'ペ','ホ':'ポ'};
  const arr=s.split('').map(c=>m[c]||c);
  let result='';
  for(let i=0;i<arr.length;i++){
    if(arr[i]==='゛'&&result&&dk[result[result.length-1]]){result=result.slice(0,-1)+dk[result[result.length-1]];}
    else if(arr[i]==='゜'&&result&&hdk[result[result.length-1]]){result=result.slice(0,-1)+hdk[result[result.length-1]];}
    else{result+=arr[i];}
  }
  return result;
}
function fmtDate(s){
  if(!s)return '';
  let m=s.match(/令和\s*(\d+)\s*[\/．年]\s*(\d+)\s*[\/．月]\s*(\d+)/);
  if(m)return`${2018+parseInt(m[1])}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m=s.match(/平成\s*(\d+)\s*[\/．年]\s*(\d+)\s*[\/．月]\s*(\d+)/);
  if(m)return`${1988+parseInt(m[1])}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m=s.match(/昭和\s*(\d+)\s*[\/．年]\s*(\d+)\s*[\/．月]\s*(\d+)/);
  if(m)return`${1925+parseInt(m[1])}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m=s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
  if(m)return`${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  return s;
}

window.renderStock=function(){

  let list=Object.values(stock).sort((a,b)=>{
    const da=a.date||''; const db2=b.date||'';
    if(da===db2) return (b.addedAt||0)-(a.addedAt||0);
    return da>db2?-1:1;
  });
  if(q)list=list.filter(v=>(v.name||'').toLowerCase().includes(q)||(v.vin||'').includes(q));
  if(f.startsWith('s1_'))list=list.filter(v=>(v.status1||'undelivered')===f.slice(3));

        ?'<span style="font-size:10px;color:var(--green)">✅清掃済</span>'
        :`<button class="btn btn-xs btn-gray" onclick="quickAction(event,'${v.id}','clean')">清掃完了</button>`;
      const photoBtn=v.photographed
        ?'<span style="font-size:10px;color:var(--green)">✅撮影済</span>'

      actionBtns=`<div class="action-btns">${cleanBtn}${photoBtn}</div>`;

      <div style="text-align:right;flex-shrink:0;margin-left:4px">
        <div style="font-size:12px;font-weight:700">¥${fmt(v.total||v.price)}</div>
        <div style="font-size:10px;color:var(--text3)">${v.loc||''}</div>
      </div>
    </div>`;
  }).join('');
  updateBulkBar();
};

// クイックアクション（清掃完了・撮影完了・整備完了）
window.quickAction=async function(e,id,type){
  e.stopPropagation();
  const v=stock[id];if(!v)return;
  const upd={};
  if(type==='clean')   upd.cleaned=true;
  if(type==='photo')   upd.photographed=true;
  if(type==='maintain'){
    upd.maintained=true;
    // 要整備状態なら点検済(異常なし)へ自動変更
    if(v.status2==='ng') upd.status2='ok';
  }
  // 販売済の場合：清掃＋整備両方完了で仕上完了に自動変更
  const newCleaned  = upd.cleaned    !== undefined ? upd.cleaned    : v.cleaned;
  const newMaintained = upd.maintained !== undefined ? upd.maintained : v.maintained;
  if((v.status1==='sold_ng'||v.status1==='sold_ok') && newCleaned && newMaintained){
    upd.status1='sold_ok';
  }
  await dbUpd(`stock/${id}`,upd);
};

// 個別プルダウン変更
window.indivChange=async function(id,field,val){
  if(field==='s1') await dbUpd(`stock/${id}`,{status1:val});
  if(field==='s2') await dbUpd(`stock/${id}`,{status2:val});
};

// ===== 一括操作 =====
window.toggleCheck=function(id,checked){
  if(checked)checkedIds.add(id);else checkedIds.delete(id);
  document.getElementById('si-'+id)?.classList.toggle('checked',checked);
  updateBulkBar();
};
window.toggleAll=function(checked){
  document.querySelectorAll('#stock-list input[type=checkbox]').forEach(cb=>{
    const id=cb.getAttribute('onchange').match(/'([^']+)'/)[1];
    cb.checked=checked;
    if(checked)checkedIds.add(id);else checkedIds.delete(id);
    document.getElementById('si-'+id)?.classList.toggle('checked',checked);
  });
  updateBulkBar();
};
function updateBulkBar(){
  document.getElementById('chk-count').textContent=checkedIds.size+'件選択';
  const cbs=document.querySelectorAll('#stock-list input[type=checkbox]');
  document.getElementById('chk-all').checked=checkedIds.size>0&&checkedIds.size===cbs.length;
}
window.applyBulk=async function(){
  const action=document.getElementById('bulk-action').value;
  if(!action){alert('操作を選択してください');return;}
  if(!checkedIds.size){alert('車両を選択してください');return;}
  const lbl={
    s1_undelivered:'店頭未着',s1_floor:'店頭在庫',s1_loaner:'代車/レンタカー',
    s1_listing:'出品中',s1_sold_ng:'販売済(要仕上)',s1_sold_ok:'販売済(仕上完了)',s1_delivered:'納車完了',
    s2_none:'未点検',s2_ng:'点検済(要整備)',s2_ok:'点検済(異常なし)',s2_skip:'点検不要',
    delete:'削除'
  }[action];
  if(!confirm(`選択した${checkedIds.size}台を「${lbl}」にしますか？`))return;
  showLoading(`${checkedIds.size}台を処理中...`);
  const promises=[];
  for(const id of checkedIds){
    const v=stock[id];if(!v)continue;
    if(action==='delete'){
      const car=Object.values(cars).find(c=>c.stockId===id);
      if(car)promises.push(dbDel(`cars/${car.id}`));
      promises.push(dbDel(`stock/${id}`));
    } else if(action.startsWith('s1_')){
      const newS1=action.slice(3);
      const upd={status1:newS1};
      if(newS1==='loaner'&&!Object.values(cars).some(c=>c.stockId===id)){
        const cid=uid();
        promises.push(dbSet(`cars/${cid}`,{id:cid,name:v.name,plate:v.regNo||'未登録',status:'available',fromStock:true,stockId:id,addedAt:nowTs()}));
        upd.isLoaner=true;
      }
      promises.push(dbUpd(`stock/${id}`,upd));
    } else if(action.startsWith('s2_')){
      promises.push(dbUpd(`stock/${id}`,{status2:action.slice(3)}));
    }
  }
  await Promise.all(promises);
  checkedIds.clear();
  document.getElementById('bulk-action').value='';
  hideLoading();
};

// ===== 販売車詳細 =====
window.openStockDetail=function(id){
  const v=stock[id];if(!v)return;
  document.getElementById('sd-title').textContent=v.name||'車両詳細';
  const ins=Object.values(inspections).filter(i=>i.vehicleId===id);
  const s1opts=Object.entries(S1).map(([k,sv])=>`<option value="${k}" ${(v.status1||'undelivered')===k?'selected':''}>${sv.label}</option>`).join('');
  const s2opts=Object.entries(S2).map(([k,sv])=>`<option value="${k}" ${(v.status2||'none')===k?'selected':''}>${sv.label}</option>`).join('');
  const lb=v.isLoaner
    ?`<button class="btn btn-sm btn-danger" style="width:100%;margin-top:6px" onclick="removeFromLoaner('${v.id}')">代車から外す</button>`
    :`<button class="btn btn-sm btn-blue" style="width:100%;margin-top:6px" onclick="addFromStockDirect('${v.id}')">代車に追加</button>`;
  const rows=[
    ['車台番号',v.vin],['色',v.color],['年式',v.year],['車検期限',v.shaken],
    ['仕入日',v.date],['契約日',v.cdate],['納車日',v.ddate],['売上日',v.sdate],
    ['仕入先',v.sup],['担当者',v.staff],['保管場所',v.loc],
    ['仕入金額','¥'+fmt(v.price)],['合計金額','¥'+fmt(v.total)],
  ].filter(([,val])=>val&&val!=='¥0'&&val!=='¥').map(([k,val])=>`<tr><td>${k}</td><td>${val}</td></tr>`).join('');
  document.getElementById('sd-body').innerHTML=`
    <table class="dtable">${rows}${v.equip?`<tr><td>装備品</td><td style="font-size:11px">${v.equip}</td></tr>`:''}</table>
    <p class="lbl">ステータス①（場所・進捗）</p><select id="sd-s1">${s1opts}</select>
    <p class="lbl">ステータス②（点検）</p><select id="sd-s2" style="margin-bottom:6px">${s2opts}</select>
    ${lb}
    <p class="lbl">メモ</p><textarea id="sd-memo" rows="2" style="margin-bottom:10px">${v.memo||''}</textarea>
    ${ins.length?`<p class="lbl">点検シート（${ins.length}件）</p>
    <div class="photo-grid" style="margin-bottom:10px">${ins.map(i=>`<div class="photo-card" onclick="viewPhotoById('${i.id}')">
      <img src="${i.photoUrl}" loading="lazy"><div class="photo-info">
      <div style="font-size:11px;font-weight:700">${i.date}${i.needRepair?'<span style="color:var(--red)"> ⚠️要整備</span>':''}</div>
      <div style="font-size:10px;color:var(--text3)">${i.memo||''}</div></div></div>`).join('')}</div>`:''}
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-stock-detail')">閉じる</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveSD('${id}')">保存</button>
    </div>`;
  openModal('modal-stock-detail');
};

window.saveSD=async function(id){
  await dbUpd(`stock/${id}`,{
    status1:document.getElementById('sd-s1').value,
    status2:document.getElementById('sd-s2').value,
    memo:document.getElementById('sd-memo').value
  });
  closeModal('modal-stock-detail');
};

// ===== 点検シート =====
window.openUpload=function(){
  const sorted=Object.values(stock)
    .filter(v=>v.status1!=='delivered')
    .sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  document.getElementById('up-vehicle').innerHTML='<option value="">-- 車両を選択 --</option>'+
    sorted.map(v=>`<option value="${v.id}">${v.name}${v.vin?' ('+v.vin+')':''}</option>`).join('');
  uploadDataUrl=null;
  document.getElementById('up-preview').innerHTML='<div style="font-size:24px">📷</div><p style="font-size:13px">タップして写真を選択</p>';
  document.getElementById('up-name').value='';
  document.getElementById('up-memo').value='';
  document.getElementById('up-repair').checked=false;
  const prog=document.getElementById('up-progress');prog.style.display='none';prog.textContent='';
  openModal('modal-upload');
};

window.previewPhoto=function(e){
  const file=e.target.files[0];if(!file)return;
  const img=new Image();const reader=new FileReader();
  reader.onload=ev=>{
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      uploadDataUrl=canvas.toDataURL('image/jpeg',0.75);
      document.getElementById('up-preview').innerHTML=`<img src="${uploadDataUrl}" style="max-height:130px;border-radius:6px;object-fit:contain">`;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveInsp=async function(){
  const vid=document.getElementById('up-vehicle').value;
  const mn=document.getElementById('up-name').value.trim();
  const v=vid?stock[vid]:null;
  const name=v?v.name:mn;
  if(!name){alert('車両を選択するか車種名を入力してください');return;}
  if(!uploadDataUrl){alert('写真を選択してください');return;}
  const memo=document.getElementById('up-memo').value.trim();
  const needRepair=document.getElementById('up-repair').checked;
  const btn=document.getElementById('btn-save-insp');
  const prog=document.getElementById('up-progress');
  btn.disabled=true;prog.style.display='block';prog.textContent='📤 保存中...';
  try{
    const id=uid();
    // 点検シート保存
    await dbSet(`inspections/${id}`,{id,vehicleId:vid||null,carName:name,memo,needRepair,photoUrl:uploadDataUrl,date:today(),addedAt:nowTs()});
    // 車両の点検ステータスを自動更新
    if(vid&&v){
      const newS2=needRepair?'ng':'ok';
      await dbUpd(`stock/${vid}`,{status2:newS2});
    }
    prog.textContent='✅ 保存しました';
    uploadDataUrl=null;
    setTimeout(()=>closeModal('modal-upload'),700);
  }catch(err){prog.textContent='❌ エラー: '+err.message;}
  btn.disabled=false;
};

function renderInspections(){
  const grid=document.getElementById('photo-grid');
  const noP=document.getElementById('no-photos');
  const list=Object.values(inspections).sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  if(!list.length){grid.innerHTML='';noP.classList.remove('hidden');return;}
  noP.classList.add('hidden');
  grid.innerHTML=list.map(ins=>`<div class="photo-card" onclick="viewPhotoById('${ins.id}')">
    <img src="${ins.photoUrl}" loading="lazy" alt="${ins.carName}">
    <div class="photo-info">
      <div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ins.carName}</div>
      <div style="font-size:10px;color:var(--text3)">${ins.date}${ins.needRepair?'<span style="color:var(--red)"> ⚠️</span>':''}${ins.memo?' · '+ins.memo:''}</div>
    </div></div>`).join('');
}
window.viewPhotoById=function(id){
  const ins=inspections[id];if(!ins)return;
  document.getElementById('full-img-el').src=ins.photoUrl;
  document.getElementById('full-img-name').textContent=ins.carName+(ins.needRepair?' ⚠️要整備':'');
  document.getElementById('full-img-meta').textContent=ins.date+(ins.memo?' · '+ins.memo:'');
  document.getElementById('full-img').classList.add('open');
};
window.closeFullImg=()=>document.getElementById('full-img').classList.remove('open');

startListeners();
</script>
