<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画像データ移行ツール</title>
<style>
body{font-family:sans-serif;background:#0F1117;color:#E8EAF0;padding:20px;max-width:600px;margin:0 auto}
h2{color:#00E676}
.btn{padding:10px 20px;border-radius:8px;border:2px solid;cursor:pointer;font-size:14px;font-weight:700;background:#080808}
.btn-green{border-color:#00E676;color:#00E676}
.btn-red{border-color:#FF1744;color:#FF1744}
.btn:disabled{opacity:0.4;cursor:not-allowed}
#log{background:#1C1F2A;border-radius:8px;padding:12px;margin-top:16px;font-size:12px;line-height:1.8;max-height:400px;overflow-y:auto;border:1px solid #383C4E}
.ok{color:#00E676}.err{color:#FF1744}.info{color:#00ADEF}.warn{color:#FFB300}
</style>
</head>
<body>
<h2>🔄 画像データ移行ツール</h2>
<p style="font-size:13px;color:#A0A8C0">inspections・listingsの画像データをinspectionPhotos・listingPhotosに移行します。<br>移行後、元データのphotoUrlは削除されます。</p>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
  <button class="btn btn-green" id="btn-dry" onclick="runMigration(true)">🔍 ドライラン（確認のみ）</button>
  <button class="btn btn-green" id="btn-run" onclick="runMigration(false)">▶ 移行実行</button>
  <button class="btn btn-red" id="btn-clear" onclick="clearLog()">ログ消去</button>
</div>

<div id="log"><span class="info">準備完了。まずドライランで確認してください。</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFJKdWkTa9WvX9W3ZA95P0BoDDugQUkuM",
  authDomain: "ciel-autoworks.firebaseapp.com",
  databaseURL: "https://ciel-autoworks-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ciel-autoworks",
  storageBucket: "ciel-autoworks.firebasestorage.app",
  messagingSenderId: "266528519369",
  appId: "1:266528519369:web:d32686387aa9b0362cc918"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function log(msg, cls=''){
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.clearLog = function(){
  document.getElementById('log').innerHTML = '';
};

window.runMigration = async function(dryRun){
  const btnDry = document.getElementById('btn-dry');
  const btnRun = document.getElementById('btn-run');
  btnDry.disabled = true; btnRun.disabled = true;

  log(dryRun ? '=== ドライラン開始（DBへの書き込みなし）===' : '=== 移行実行開始 ===', 'info');

  let inspMoved=0, inspSkipped=0, inspAlready=0;
  let listMoved=0, listSkipped=0, listAlready=0;

  try{
    // ===== inspections 移行 =====
    log('--- inspections を確認中... ---', 'info');
    const inspSnap = await get(ref(db, 'inspections'));
    const inspData = inspSnap.val() || {};
    const inspPhotoSnap = await get(ref(db, 'inspectionPhotos'));
    const inspPhotoData = inspPhotoSnap.val() || {};

    for(const [id, ins] of Object.entries(inspData)){
      if(inspPhotoData[id]?.photoUrl){
        // すでに移行済み
        if(ins.photoUrl){
          log(`  [済] ${id} - ${ins.carName||'不明'} (新パスあり・旧photoUrl残存)`, 'warn');
          if(!dryRun){
            // 旧photoUrlだけ削除
            const upd = {...ins};
            delete upd.photoUrl;
            await set(ref(db, `inspections/${id}`), upd);
            log(`    → 旧photoUrl削除完了`, 'ok');
          }
        }else{
          log(`  [完了] ${id} - ${ins.carName||'不明'} (移行済みスキップ)`, 'ok');
          inspAlready++;
        }
      }else if(ins.photoUrl){
        log(`  [移行] ${id} - ${ins.carName||'不明'} (${Math.round(ins.photoUrl.length/1024)}KB)`, 'warn');
        if(!dryRun){
          // 新パスに画像を保存
          await set(ref(db, `inspectionPhotos/${id}`), { photoUrl: ins.photoUrl });
          // 旧データからphotoUrlを削除
          const upd = {...ins};
          delete upd.photoUrl;
          await set(ref(db, `inspections/${id}`), upd);
          log(`    → 移行完了`, 'ok');
        }
        inspMoved++;
      }else{
        log(`  [スキップ] ${id} - ${ins.carName||'不明'} (photoUrlなし)`, '');
        inspSkipped++;
      }
    }

    // ===== listings 移行 =====
    log('--- listings を確認中... ---', 'info');
    const listSnap = await get(ref(db, 'listings'));
    const listData = listSnap.val() || {};
    const listPhotoSnap = await get(ref(db, 'listingPhotos'));
    const listPhotoData = listPhotoSnap.val() || {};

    for(const [id, lst] of Object.entries(listData)){
      if(listPhotoData[id]?.photoUrl){
        if(lst.photoUrl){
          log(`  [済] ${id} - 出品票 (新パスあり・旧photoUrl残存)`, 'warn');
          if(!dryRun){
            const upd = {...lst};
            delete upd.photoUrl;
            await set(ref(db, `listings/${id}`), upd);
            log(`    → 旧photoUrl削除完了`, 'ok');
          }
        }else{
          log(`  [完了] ${id} - 出品票 (移行済みスキップ)`, 'ok');
          listAlready++;
        }
      }else if(lst.photoUrl){
        log(`  [移行] ${id} - 出品票 (${Math.round(lst.photoUrl.length/1024)}KB)`, 'warn');
        if(!dryRun){
          await set(ref(db, `listingPhotos/${id}`), { photoUrl: lst.photoUrl });
          const upd = {...lst};
          delete upd.photoUrl;
          await set(ref(db, `listings/${id}`), upd);
          log(`    → 移行完了`, 'ok');
        }
        listMoved++;
      }else{
        log(`  [スキップ] ${id} - 出品票 (photoUrlなし)`, '');
        listSkipped++;
      }
    }

    log('', '');
    log(`=== 完了 ===`, 'ok');
    log(`点検シート: 移行${inspMoved}件 / 移行済${inspAlready}件 / スキップ${inspSkipped}件`, 'ok');
    log(`出品票:     移行${listMoved}件 / 移行済${listAlready}件 / スキップ${listSkipped}件`, 'ok');
    if(dryRun) log('※ドライランのため実際の変更はありません。「移行実行」ボタンで本番移行できます。', 'info');
    else log('移行完了！ページを更新してご確認ください。', 'ok');

  }catch(err){
    log('エラー: ' + err.message, 'err');
  }

  btnDry.disabled = false; btnRun.disabled = false;
};
</script>
</body>
</html>
